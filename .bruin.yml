default_environment: default

environments:
  default:
    connections:
      google_cloud_platform:
        - name: "gcp-energy"
          project_id: "${GCP_PROJECT_ID}"
          location: "us-central1"
          service_account_file: "${GOOGLE_APPLICATION_CREDENTIALS}"

      gcs:
        - name: "gcs-energy"
          service_account_file: "${GOOGLE_APPLICATION_CREDENTIALS}"
