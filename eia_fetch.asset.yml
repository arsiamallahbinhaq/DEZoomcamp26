name: ingestion.eia_fetch
type: python
description: "Fetch EIA petroleum & natural gas production data → GCS"

connection: gcp-energy

parameters:
  EIA_API_KEY: "${EIA_API_KEY}"
  GCS_BUCKET_NAME: "${GCS_BUCKET_NAME}"

depends: []

columns:
  - name: period
    type: date
    description: "Bulan produksi (YYYY-MM)"
    checks:
      - name: not_null

  - name: energy_type
    type: string
    description: "Jenis energi: petroleum atau natural_gas"
    checks:
      - name: not_null
      - name: accepted_values
        value: ["petroleum", "natural_gas"]

  - name: value
    type: float
    description: "Volume produksi"
