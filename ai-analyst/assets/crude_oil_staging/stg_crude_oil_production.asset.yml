name: crude_oil_staging.stg_crude_oil_production
type: bq.source
description: |-
  Imported table: crude_oil_staging.stg_crude_oil_production
  Extracted at: 2026-04-17T23:45:06Z
  Created at: 2026-04-13T13:49:38Z
  Last modified: 2026-04-13T13:49:38Z
  Row count: 2
  Size: 542 bytes

  This staging table contains state-level monthly crude oil field production records standardized from the U.S. Energy Information Administration (EIA) petroleum production API feed. In the project pipeline, raw parquet extracts are fetched from the EIA API, loaded into `crude_oil_raw.crude_oil_production_raw`, and then transformed into this table for analytics-ready use.

  The transformation keeps only monthly crude oil production records for `product = EPC0`, `process = FPF`, and `units = MBBL`, converts the source period into a proper `DATE`, derives `production_year` and `production_month`, extracts a two-letter `state_code` from the raw `area_name`, and standardizes `state_name` from the series description when possible. Records are deduplicated by the latest `ingested_at` and `load_date` within each `period`, `state_code`, `series`, and `units` combination.

  This table is the main curated staging layer feeding `crude_oil_mart.fct_crude_oil_production`, where state totals, national share, and growth metrics are calculated for dashboarding. Because the source is monthly EIA data, refreshes are expected to be batch-oriented rather than streaming. The underlying BigQuery table is partitioned by `period` and clustered by `state_code`, which fits time-series and state-slice analysis.

  Notable nuances:
  - `area_name_raw` retains the original EIA geographic label such as `USA-TX`; it is a legacy raw label rather than a presentation-friendly state name.
  - `duoarea`, `series`, and `series_description` are EIA-specific identifiers that are useful for lineage and troubleshooting but less suitable for business-facing reporting.
  - `production_value` is already filtered to non-negative values in the SQL transformation, so negative production records should not appear here.
  - `units` is expected to be consistently `MBBL` in this dataset, meaning production is measured in thousand barrels.
tags:
  - energy
  - crude-oil
  - staging
  - bigquery
  - state-production
  - time-series
  - internal
  - batch
  - partitioned
domains:
