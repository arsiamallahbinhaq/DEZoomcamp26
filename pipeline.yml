name: Energy Pipeline

on:
  schedule:
    # Setiap hari jam 06:00 UTC (13:00 WIB)
    - cron: "0 6 * * *"
  workflow_dispatch:  # Bisa trigger manual dari GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Bruin CLI
        run: |
          curl -LsSf https://getbruin.com/install/cli | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up GCP credentials
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Set environment variables
        run: |
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"    >> $GITHUB_ENV
          echo "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}"  >> $GITHUB_ENV
          echo "EIA_API_KEY=${{ secrets.EIA_API_KEY }}"          >> $GITHUB_ENV

      - name: Run Bruin pipeline
        run: |
          bruin run \
            --environment default \
            assets/

      - name: Notify on failure
        if: failure()
        run: echo "Pipeline failed! Check logs above."
